{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="max-w-4xl mx-auto py-10">

    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
        <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl gradient-primary flex items-center justify-center">
                <i data-lucide="send" class="w-6 h-6 text-white"></i>
            </div>
            Transfer Amount from {{ branch.name }}
        </h1>

        <a href="{% url 'branch_detail' branch.id %}"
            class="px-4 py-2 border border-gray-300 rounded-xl gradient-primary text-white transition flex items-center gap-2 text-sm font-medium">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            Back to Branch Detail
        </a>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-2xl shadow-lg p-6 sm:p-8">

        <form method="POST">
            {% csrf_token %}

            <!-- Target Branch -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Target Branch
                </label>
                <select name="target_branch" class="form-input w-full border-2 rounded-lg p-2" required>
                    <option value="">Select Branch</option>
                    {% for b in other_branches %}
                    <option value="{{ b.id }}">{{ b.name }} - {{ b.location }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Date -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Date
                </label>
                <input type="date" name="created_on" value="{{ today|date:'Y-m-d' }}"
                    class="form-input w-full border-2 rounded-lg p-2" required>
            </div>

            <!-- Amount -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Amount (BD)
                </label>
                <input type="number" name="amount" step="0.01" min="0.01"
                    class="form-input w-full border-2 rounded-lg p-2" placeholder="Enter Amount" required>
            </div>

            <!-- Description -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Narration
                </label>
                <textarea name="description" rows="2" class="form-input w-full border-2 rounded-lg p-2"
                    placeholder="Optional description"></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition flex items-center justify-center gap-2">
                <i data-lucide="send" class="w-5 h-5"></i>
                Transfer Amount
            </button>

        </form>

    </div>

</div>

<script>
    lucide.createIcons();
</script>

{% endblock %}
