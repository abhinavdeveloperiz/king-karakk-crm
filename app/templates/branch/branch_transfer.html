{% extends "branchbase.html" %}
{% load static %}
{% block content %}

<div class="max-w-4xl mx-auto px-4">

    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">

        <a href="{% url 'branch_expense_sales_list' %}"
            class="inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-gray-300 gradient-primary hover:opacity-80 text-white transition text-sm font-medium w-24">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            Back
        </a>

        <div class="flex items-center gap-3 uppercase">
            <div class="w-12 h-12 rounded-2xl gradient-primary flex items-center justify-center shadow">
                <i data-lucide="send" class="w-6 h-6 text-white"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-900">Transfer Amount</h1>
                <p class="text-sm text-gray-500">Transfer funds to another branch</p>
            </div>
        </div>

    </div>

    <!-- Card -->
    <audio id="saveSound" preload="auto">
        <source src="{% static 'audio/success.mp3' %}" type="audio/mpeg">
    </audio>

    <div class="bg-white/90 backdrop-blur rounded-3xl shadow-xl border p-6 sm:p-10">

        <form method="POST" class="grid grid-cols-1 sm:grid-cols-2 gap-6" onsubmit="playSaveSound()">
            {% csrf_token %}

            <!-- Target Branch -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Target Branch
                </label>
                <select name="target_branch" class="form-input w-full border-2 rounded-lg p-2" required>
                    <option value="">Select Branch</option>
                    {% for b in other_branches %}
                    <option value="{{ b.id }}">{{ b.name }} - {{ b.location }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Date -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Date
                </label>
                <input type="date" name="created_on" value="{{ today|date:'Y-m-d' }}"
                    class="form-input w-full border-2 rounded-lg p-2" required>
            </div>

            <!-- Amount -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Amount (BD)
                </label>
                <input type="number" name="amount" step="0.01" min="0.01"
                    class="form-input w-full border-2 rounded-lg p-2" placeholder="Enter Amount" required>
            </div>

            <!-- Description -->
            <div class="sm:col-span-2">
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Narration
                </label>
                <textarea name="description" rows="2" class="form-input w-full border-2 rounded-lg p-2"
                    placeholder="Optional description"></textarea>
            </div>

            <!-- Submit -->
            <div class="sm:col-span-2">
                <button type="submit"
                    class="w-full py-3 rounded-xl gradient-primary text-white font-bold tracking-wide shadow-lg hover:shadow-xl hover:scale-[1.01] transition">
                    Transfer Amount
                </button>
            </div>

        </form>
    </div>

</div>

<!-- play sound -->
<script>
    function playSaveSound() {
        const sound = document.getElementById("saveSound");
        if (sound) {
            sound.currentTime = 0;
            sound.play();
        }
    }
</script>

<script>
    lucide.createIcons();
</script>

{% endblock %}
